name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    name: Build, Test, Format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Fuse.sln

      - name: Build
        run: dotnet build Fuse.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Fuse.sln --configuration Release --no-build --verbosity normal

      - name: Format check
        run: dotnet format Fuse.sln --verify-no-changes
