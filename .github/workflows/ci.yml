name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    name: Build, Test, Format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Fuse.slnx

      - name: Build
        run: dotnet build Fuse.slnx --configuration Release --no-restore

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Test with coverage
        run: dotnet-coverage collect "dotnet test Fuse.slnx --configuration Release --no-build --verbosity normal" --output coverage.cobertura.xml --output-format cobertura

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Format check
        run: dotnet format Fuse.slnx --verify-no-changes

  runtime:
    name: Self-contained runtime (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            profile: runtime-win-x64
            binary: fuse.exe
          - os: ubuntu-latest
            rid: linux-x64
            profile: runtime-linux-x64
            binary: fuse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux publish prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/Host/Fuse.Cli/Fuse.Cli.csproj

      - name: Publish self-contained
        run: dotnet publish src/Host/Fuse.Cli/Fuse.Cli.csproj --configuration Release /p:PublishProfile=${{ matrix.profile }}

      - name: Smoke test init help
        shell: bash
        run: |
          BIN="artifacts/runtime/${{ matrix.rid }}/${{ matrix.binary }}"
          "$BIN" init --help

      - name: Smoke test SampleShop fusion
        shell: bash
        run: |
          BIN="artifacts/runtime/${{ matrix.rid }}/${{ matrix.binary }}"
          OUT="/tmp/fuse-runtime-smoke"
          rm -rf "$OUT"
          mkdir -p "$OUT"
          "$BIN" dotnet \
            --directory tests/fixtures/SampleShop \
            --output "$OUT" \
            --overwrite \
            --format xml \
            --tokenizer o200k_base
