name: Publish to MCP Registry

# Publishes mcp-registry/server.json to the official MCP Registry on a version
# tag, after the NuGet package is live (the registry validates that the package
# exists and carries the `mcp-name` ownership marker, which is in the packed
# README). Authentication uses GitHub Actions OIDC: the io.github.litenova-solutions
# namespace (io.github.Litenova-Solutions) is owned by this repository's org, so
# no secret is needed.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC authentication to the registry
  contents: read

jobs:
  publish:
    name: Publish server.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Catch schema regressions (for example the registry's 100-char description cap) on the PR/tag
      # before we spend minutes waiting on NuGet, instead of a 422 at the publish step.
      - name: Validate manifest
        run: |
          set -euo pipefail
          desc="$(jq -r '.description' mcp-registry/server.json)"
          len="${#desc}"
          if (( len > 100 )); then
            echo "::error::server.json description is ${len} chars; the registry caps it at 100."
            exit 1
          fi
          echo "Manifest description length ${len}/100 - OK."

      # server.json is the source of truth for the version (see build/set-version.ps1). On a tag, fail if the
      # manifest does not match it; on manual dispatch, just check cross-package consistency. Then read the
      # published version from the manifest itself, no tag rewrite.
      - name: Verify version and read from manifest
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") { ./build/verify-version.ps1 -Tag "${{ github.ref_name }}" }
          else { ./build/verify-version.ps1 }
          $v = (Get-Content mcp-registry/server.json -Raw | ConvertFrom-Json).version
          "PKG_VERSION=$v" >> $env:GITHUB_ENV

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # The registry validates that the NuGet package version exists before it will accept the
      # server.json. NuGet push and indexing lag the tag push by minutes, so poll the flat
      # container until the version is live (or warn and try anyway). Prevents the
      # "version X does not exist in the registry ... wait for validation" 400 on fresh releases.
      - name: Wait for NuGet to index the package version
        run: |
          set -uo pipefail
          PKG_ID="fuse"  # NuGet flat-container paths use the lowercase package id
          URL="https://api.nuget.org/v3-flatcontainer/${PKG_ID}/index.json"
          echo "Waiting for ${PKG_ID} ${PKG_VERSION} to be indexed on NuGet..."
          for attempt in $(seq 1 30); do
            if curl -sf "$URL" | jq -e --arg v "$PKG_VERSION" '.versions | index($v)' >/dev/null 2>&1; then
              echo "Found ${PKG_ID} ${PKG_VERSION} on NuGet (attempt ${attempt})."
              exit 0
            fi
            echo "Not indexed yet (attempt ${attempt}/30); sleeping 20s..."
            sleep 20
          done
          echo "::warning::${PKG_ID} ${PKG_VERSION} not indexed on NuGet after ~10 minutes; attempting publish anyway."

      - name: Authenticate to MCP Registry (GitHub OIDC)
        working-directory: mcp-registry
        run: ../mcp-publisher login github-oidc

      # Retry to cover the brief window where NuGet's flat container lists the version but the
      # registry's own package check has not caught up yet.
      - name: Publish server to MCP Registry
        working-directory: mcp-registry
        run: |
          set -uo pipefail
          for attempt in $(seq 1 5); do
            output="$(../mcp-publisher publish 2>&1)" && status=0 || status=$?
            echo "$output"
            if [[ $status -eq 0 ]]; then
              echo "Published to MCP Registry on attempt ${attempt}."
              exit 0
            fi
            # A schema/validation rejection (HTTP 422) is permanent; retrying cannot fix a bad
            # manifest, so fail fast instead of sleeping through all five attempts.
            if echo "$output" | grep -qE 'status 422|validation failed'; then
              echo "::error::mcp-publisher rejected the manifest (validation error); not retrying."
              exit 1
            fi
            echo "Publish attempt ${attempt}/5 failed; sleeping 30s before retry..."
            sleep 30
          done
          echo "::error::mcp-publisher publish failed after 5 attempts."
          exit 1
