name: Publish NuGet

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    name: Pack and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Native AOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/Fuse.Cli/Fuse.Cli.csproj

      - name: Pack framework-dependent tool and AOT runtime packages
        shell: pwsh
        run: |
          ./build/pack-aot.ps1 -Version ${{ steps.version.outputs.version }} -Rids linux-x64

      - name: Push to NuGet.org
        run: |
          dotnet nuget push src/Fuse.Cli/nupkg/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
