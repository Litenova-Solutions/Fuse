name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish Native AOT Windows x64
        shell: pwsh
        run: |
          dotnet publish src/Host/Fuse.Cli/Fuse.Cli.csproj `
            --configuration Release `
            /p:PublishProfile=aot-win-x64 `
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Stage installer binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path publish/win-x64 -Force | Out-Null
          Copy-Item artifacts/aot/win-x64/fuse.exe publish/win-x64/fuse.exe -Force

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.VERSION }} `
            installer/fuse.iss

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fuse ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: publish/installer/fuse-${{ steps.version.outputs.VERSION }}-setup.exe
