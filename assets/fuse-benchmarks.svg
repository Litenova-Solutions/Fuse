<text x="68.0" y="1200.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">Claude Code (sonnet-4-6) gathering a change&#x27;s files: bare tools versus the Fuse MCP. 6 PRs.</text>
<text x="68.0" y="1221.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Model-dependent and a small sample (wide confidence interval); read recall together with tokens.</text>
