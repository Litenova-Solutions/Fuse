<rect x="68.0" y="422.0" width="984.0" height="38.0" rx="9" stroke="#f3d8c4" stroke-width="1" fill="#fff4ec"/>
<rect x="68.0" y="422.0" width="4.0" height="38.0" rx="2" fill="#0d9488"/>
<text x="86.0" y="445.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10.5" fill="#0d9488" text-anchor="start" font-weight="700" letter-spacing="0.08em">Result</text>
<text x="146.0" y="445.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">Every wiring edge in the fixture resolved correctly: 10 of 10, recall and precision 1.0 (Suite A).</text>
<rect x="40.0" y="504.0" width="1040.0" height="277.0" rx="16" stroke="#e5e8ef" stroke-width="1" fill="#f7f8fb"/>
<text x="68.0" y="542.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" fill="#ea580c" text-anchor="start" font-weight="700">02</text>
<text x="98.0" y="542.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="18" fill="#171a21" text-anchor="start" font-weight="700">Scoping a Change</text>
<text x="68.0" y="564.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">fuse review over 48 real merged pull requests, 25,000-token budget.</text>
<text x="68.0" y="585.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Changed files are kept as must-keep and the semantic blast radius is added: callers, DI consumers, handlers, tests.</text>
<text x="68.0" y="602.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Recall is read with tokens: the whole review arrives in a median 874 tokens.</text>
<text x="266.0" y="643.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Changed-file recall</text>
<text x="266.0" y="657.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10" fill="#ea580c" text-anchor="end" font-weight="400" letter-spacing="0.03em">with Fuse</text>
