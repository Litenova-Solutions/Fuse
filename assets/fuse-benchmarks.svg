<text x="146.0" y="742.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">100% of changed files kept at 90% precision, a median 874 returned tokens per review (Suite B).</text>
<rect x="40.0" y="801.0" width="1040.0" height="319.0" rx="16" stroke="#e5e8ef" stroke-width="1" fill="#f7f8fb"/>
<text x="68.0" y="839.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" fill="#ea580c" text-anchor="start" font-weight="700">03</text>
<text x="98.0" y="839.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="18" fill="#171a21" text-anchor="start" font-weight="700">Localizing From a Task Title</text>
<text x="68.0" y="861.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">fuse localize recall by title signal, no git base, 108 pull requests.</text>
<text x="68.0" y="882.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">The hardest mode: a sentence with no diff. Identifier-rich titles localize; vague ones do not.</text>
<text x="68.0" y="899.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">An honest floor, not a headline. Low-signal titles are not yet flagged, a known gap.</text>
<text x="266.0" y="940.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Identifier-rich titles</text>
