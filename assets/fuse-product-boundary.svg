<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1000 560" role="img" aria-label="Fuse local product boundary">
<style>
:root{--bg:#fff;--panel:#f7f8fb;--border:#dfe3eb;--ink:#171a21;--muted:#566072;--brand:#6d4aff;--soft:#efeaff;--line:#8b79e8;--safe:#137a68}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--ink:#e6edf3;--muted:#9aa5b1;--brand:#a78bfa;--soft:#211b34;--line:#8b78d3;--safe:#45c7ae}}
.bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--border);stroke-width:1.5}.fuse{fill:var(--soft);stroke:var(--line);stroke-width:1.5}
.boundary{fill:none;stroke:var(--border);stroke-width:2;stroke-dasharray:7 6}.ink{fill:var(--ink)}.muted{fill:var(--muted)}.brand{fill:var(--brand)}
.safe{fill:var(--safe)}.edge{stroke:var(--line);stroke-width:2;fill:none}.head{fill:var(--line)}
</style>
<rect width="1000" height="560" class="bg"/><text x="50" y="50" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="25" class="ink" font-weight="800" text-anchor="start">The local product boundary</text><text x="50" y="78" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" class="muted" font-weight="400" text-anchor="start">Fuse runs beside the repository. No model is fetched, required, or shipped.</text><rect x="35" y="100" width="930" height="410" rx="18" class="boundary"/><text x="58" y="128" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="muted" font-weight="700" text-anchor="start">YOUR MACHINE</text><rect x="70" y="165" width="220" height="104" rx="12" class="panel"/><text x="180" y="199" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" class="ink" font-weight="700" text-anchor="middle">AI client</text><text x="180" y="225" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" class="muted" font-weight="400" text-anchor="middle">Cursor, Claude, Copilot</text><text x="180" y="248" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="muted" font-weight="400" text-anchor="middle">calls MCP tools over stdio</text><rect x="390" y="145" width="270" height="270" rx="12" class="fuse"/><text x="525" y="184" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="19" class="brand" font-weight="800" text-anchor="middle">Fuse local process</text><text x="525" y="215" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="12" class="muted" font-weight="400" text-anchor="middle">collection and reduction</text><text x="525" y="241" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="12" class="muted" font-weight="400" text-anchor="middle">Roslyn syntax and semantic graph</text><text x="525" y="267" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="12" class="muted" font-weight="400" text-anchor="middle">graded compiler verification</text><text x="525" y="293" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="12" class="muted" font-weight="400" text-anchor="middle">deterministic lexical retrieval</text><rect x="425" y="324" width="200" height="58" rx="12" class="panel"/><text x="525" y="349" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="13" class="ink" font-weight="700" text-anchor="middle">.fuse/fuse.db</text><text x="525" y="369" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" font-weight="400" text-anchor="middle">local SQLite index</text><rect x="760" y="165" width="170" height="104" rx="12" class="panel"/><text x="845" y="199" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" class="ink" font-weight="700" text-anchor="middle">Repository</text><text x="845" y="225" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" font-weight="400" text-anchor="middle">source and project files</text><text x="845" y="248" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="safe" font-weight="700" text-anchor="middle">read for analysis</text><rect x="760" y="315" width="170" height="100" rx="12" class="panel"/><text x="845" y="347" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16" class="ink" font-weight="700" text-anchor="middle">.NET toolchain</text><text x="845" y="373" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" font-weight="400" text-anchor="middle">compiler and tests</text><text x="845" y="395" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="muted" font-weight="400" text-anchor="middle">invoked when required</text><line x1="290" y1="217" x2="381" y2="217" class="edge"/><polygon points="380,212 380,222 390,217" class="head"/><line x1="660" y1="217" x2="751" y2="217" class="edge"/><polygon points="750,212 750,222 760,217" class="head"/><line x1="660" y1="365" x2="751" y2="365" class="edge"/><polygon points="750,360 750,370 760,365" class="head"/><rect x="70" y="330" width="220" height="85" rx="12" class="panel" stroke-dasharray="6 5"/><text x="180" y="358" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" class="ink" font-weight="700" text-anchor="middle">Working-tree writes</text><text x="180" y="382" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="brand" font-weight="700" text-anchor="middle">only fuse_workspace apply</text><text x="180" y="401" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="muted" font-weight="400" text-anchor="middle">dry run unless write=true</text><text x="500" y="540" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" font-weight="600" text-anchor="middle">Local inputs stay local unless the AI client sends returned context elsewhere.</text></svg>