<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"><defs></defs><rect width="1280" height="640" fill="#ffffff"/><g transform="translate(494.8,36) scale(1.32)"><g transform="translate(74,10)"><rect width="72" height="72" rx="16" fill="#6d4aff"/><g transform="scale(2.25)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 9h5" opacity="0.7"/><path d="M7 16h4"/><path d="M7 23h5" opacity="0.7"/><path d="M12 9c3.5 0 1.5 7 5 7" opacity="0.7"/><path d="M12 23c3.5 0 1.5-7 5-7" opacity="0.7"/><path d="M19 16h6"/></g><circle cx="39.4" cy="36" r="6.1" fill="#ffffff"/></g><text x="110" y="132" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="44" font-weight="800" fill="#6d4aff" letter-spacing="0.5">Fuse</text></g><text x="640.0" y="318.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="58" fill="#171a21" text-anchor="middle" font-weight="800" letter-spacing="-0.5">Less time, fewer tokens</text><text x="640.0" y="386.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="58" fill="#6d4aff" text-anchor="middle" font-weight="800" letter-spacing="-0.5">for your .NET coding agent.</text><text x="640.0" y="430.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="25" fill="#566072" text-anchor="middle" font-weight="400">An MCP server and CLI that hands your agent the code a task needs,</text><text x="640.0" y="466.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="25" fill="#566072" text-anchor="middle" font-weight="400">scoped and reduced, in one call.</text><text x="340.0" y="548.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="34" fill="#171a21" text-anchor="middle" font-weight="800">1 call</text><text x="340.0" y="578.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#8a93a3" text-anchor="middle" font-weight="400">not an explore loop</text><text x="640.0" y="548.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="34" fill="#171a21" text-anchor="middle" font-weight="800">~13x</text><text x="640.0" y="578.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#8a93a3" text-anchor="middle" font-weight="400">fewer tokens than a packer</text><text x="940.0" y="548.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="34" fill="#171a21" text-anchor="middle" font-weight="800">99-100%</text><text x="940.0" y="578.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#8a93a3" text-anchor="middle" font-weight="400">of the public API kept</text></svg>