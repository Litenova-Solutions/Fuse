<rect x="68.0" y="1070.0" width="984.0" height="50.0" rx="9" stroke="#f3d8c4" stroke-width="1" fill="#fff4ec"/>
<rect x="68.0" y="1070.0" width="4.0" height="50.0" rx="2" fill="#ea580c"/>
<text x="86.0" y="1090.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10.5" fill="#ea580c" text-anchor="start" font-weight="700" letter-spacing="0.08em">Result</text>
<text x="146.0" y="1090.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">About 15% overall recall (21% on identifier-rich titles), offline and dense by default. The weakest mode, bounded by a</text>
<text x="146.0" y="1108.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">mostly-syntax corpus, reported straight (Suite C).</text>
