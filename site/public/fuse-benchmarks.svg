<text x="367.1" y="1200.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10.5" fill="#8a5a12" text-anchor="middle" font-weight="600" letter-spacing="0.04em">ILLUSTRATIVE</text>
<text x="68.0" y="1224.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">Claude Code (sonnet-4-6) gathering a change&#x27;s files: bare tools versus the Fuse MCP. 12 PRs.</text>
<text x="68.0" y="1245.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Model-dependent and a small sample (wide confidence interval); read recall together with tokens.</text>
<text x="68.0" y="1262.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Tokens are now comparable across arms, so the difference is recall: the Fuse arm reaches more of the files.</text>
<text x="266.0" y="1303.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Fuse MCP recall</text>
