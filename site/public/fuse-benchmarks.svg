<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1503" viewBox="0 0 1120 1503" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
<rect x="0" y="0" width="1120" height="1503" fill="#ffffff"/>
<text x="40.0" y="52.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="23" fill="#ea580c" text-anchor="start" font-weight="800" letter-spacing="1.5">FUSE</text>
<text x="118.0" y="52.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="600">/  Roslyn-Backed .NET Semantic Context Engine for AI Agents</text>
<text x="40.0" y="92.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="30" fill="#171a21" text-anchor="start" font-weight="800" letter-spacing="-0.5">Resolve What Actually Runs.</text>
<text x="40.0" y="120.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#566072" text-anchor="start" font-weight="400">Fuse keeps a warm, Roslyn-backed semantic index of a .NET workspace and serves precise, provenance-backed</text>
<text x="40.0" y="139.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#566072" text-anchor="start" font-weight="400">context from it: which implementation is injected, which endpoint handles a route, which handler processes a</text>
<text x="40.0" y="158.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#566072" text-anchor="start" font-weight="400">request, and what a git diff semantically impacts. Token reduction is how it renders, not what it is.</text>
<rect x="40.0" y="174.0" width="13.0" height="13.0" rx="3" fill="#c0c7d4"/>
<text x="60.0" y="185.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" fill="#566072" text-anchor="start" font-weight="400">Baseline (bare tools)</text>
<rect x="228.0" y="174.0" width="13.0" height="13.0" rx="3" fill="#ea580c"/>
<text x="248.0" y="185.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" fill="#566072" text-anchor="start" font-weight="400">Fuse</text>
<text x="290.0" y="185.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" fill="#8a93a3" text-anchor="start" font-weight="400">Numbers from tests/benchmarks/results; fuse eval semantics|review|localize|agent.</text>
<rect x="40.0" y="207.0" width="1040.0" height="277.0" rx="16" stroke="#e5e8ef" stroke-width="1" fill="#f7f8fb"/>
<text x="68.0" y="245.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" fill="#ea580c" text-anchor="start" font-weight="700">01</text>
<text x="98.0" y="245.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="18" fill="#171a21" text-anchor="start" font-weight="700">Resolving .NET Wiring</text>
<text x="68.0" y="267.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">The extracted semantic graph versus hand-built edge ground truth on the wiring fixture.</text>
<text x="68.0" y="288.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">DI registration and constructor injection, MediatR request-to-handler, ASP.NET route-to-action, options binding.</text>
<text x="68.0" y="305.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Deterministic: the edges are read from Roslyn, not guessed. This is the moat.</text>
<text x="266.0" y="346.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Edge recall</text>
<text x="266.0" y="360.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10" fill="#ea580c" text-anchor="end" font-weight="400" letter-spacing="0.03em">with Fuse</text>
<rect x="282.0" y="334.0" width="770.0" height="28.0" rx="6" fill="#eceef3"/>
<linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#22c3ac"/></linearGradient>
<rect x="282.0" y="334.0" width="770.0" height="28.0" rx="6" fill="url(#g1)"/>
<text x="1040.0" y="352.5" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#ffffff" text-anchor="end" font-weight="700">100%</text>
<text x="266.0" y="388.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Edge precision</text>
<text x="266.0" y="402.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10" fill="#ea580c" text-anchor="end" font-weight="400" letter-spacing="0.03em">with Fuse</text>
<rect x="282.0" y="376.0" width="770.0" height="28.0" rx="6" fill="#eceef3"/>
<linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#22c3ac"/></linearGradient>
<rect x="282.0" y="376.0" width="770.0" height="28.0" rx="6" fill="url(#g2)"/>
<text x="1040.0" y="394.5" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#ffffff" text-anchor="end" font-weight="700">100%</text>
<rect x="68.0" y="422.0" width="984.0" height="38.0" rx="9" stroke="#f3d8c4" stroke-width="1" fill="#fff4ec"/>
<rect x="68.0" y="422.0" width="4.0" height="38.0" rx="2" fill="#0d9488"/>
<text x="86.0" y="445.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10.5" fill="#0d9488" text-anchor="start" font-weight="700" letter-spacing="0.08em">Result</text>
<text x="146.0" y="445.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">Every wiring edge in the fixture resolved correctly: 22 of 22, recall and precision 1.0 (Suite A).</text>
<rect x="40.0" y="504.0" width="1040.0" height="289.0" rx="16" stroke="#e5e8ef" stroke-width="1" fill="#f7f8fb"/>
<text x="68.0" y="542.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" fill="#ea580c" text-anchor="start" font-weight="700">02</text>
<text x="98.0" y="542.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="18" fill="#171a21" text-anchor="start" font-weight="700">Scoping a Change</text>
<text x="68.0" y="564.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">fuse review over 53 real merged pull requests, 25,000-token budget.</text>
<text x="68.0" y="585.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Changed files are kept as must-keep and the semantic blast radius is added: callers, DI consumers, handlers, tests.</text>
<text x="68.0" y="602.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">Recall is read with tokens: the whole review arrives in a median 958 tokens.</text>
<text x="266.0" y="643.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Changed-file recall</text>
<text x="266.0" y="657.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="10" fill="#ea580c" text-anchor="end" font-weight="400" letter-spacing="0.03em">with Fuse</text>
<rect x="282.0" y="631.0" width="770.0" height="28.0" rx="6" fill="#eceef3"/>
<linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ea580c"/><stop offset="1" stop-color="#fb923c"/></linearGradient>
