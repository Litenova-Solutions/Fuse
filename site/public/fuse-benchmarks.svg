<text x="146.0" y="739.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">100% of changed files kept at 79.8% precision, a median 958 returned tokens per review; a grep baseline reaches 53% recall</text>
<text x="146.0" y="757.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" fill="#171a21" text-anchor="start" font-weight="600">at 14% precision (Suite B).</text>
<rect x="40.0" y="813.0" width="1040.0" height="331.0" rx="16" stroke="#e5e8ef" stroke-width="1" fill="#f7f8fb"/>
<text x="68.0" y="851.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" fill="#ea580c" text-anchor="start" font-weight="700">03</text>
<text x="98.0" y="851.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="18" fill="#171a21" text-anchor="start" font-weight="700">Localizing From a Task Title</text>
<text x="68.0" y="873.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#566072" text-anchor="start" font-weight="500">fuse localize recall by title signal, no git base, 53 PRs on the rebuilt corpus, dense on by default.</text>
<text x="68.0" y="894.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">The hardest mode: a sentence with no diff. Identifier-rich titles localize; vague ones do not.</text>
<text x="68.0" y="911.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" fill="#8a93a3" text-anchor="start" font-weight="400">On a no-signal title Fuse refuses and hands back a navigation map instead of guessing (correct-refusal 100%).</text>
<text x="266.0" y="952.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="13" fill="#2b3140" text-anchor="end" font-weight="500">Identifier-rich titles</text>
