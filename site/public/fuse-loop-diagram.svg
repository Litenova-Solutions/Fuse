<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
<style>
  :root{
    --bg:#ffffff; --panel:#f7f8fb; --border:#e5e8ef; --ink:#171a21; --muted:#566072;
    --faint:#8a93a3; --brand:#6d4aff; --brand-soft:#efeaff; --brand-bd:#c9bcff;
    --dim:#c0c7d4; --dim-bg:#f1f3f7;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d1117; --panel:#161b22; --border:#30363d; --ink:#e6edf3; --muted:#9aa5b1;
      --faint:#7d8590; --brand:#a78bfa; --brand-soft:#211b34; --brand-bd:#5b4b8a;
      --dim:#484f58; --dim-bg:#161b22;
    }
  }
  .bg{fill:var(--bg);}
  .box{fill:var(--panel);stroke:var(--border);stroke-width:1.5;}
  .box-fuse{fill:var(--brand-soft);stroke:var(--brand-bd);stroke-width:1.5;}
  .box-dim{fill:var(--dim-bg);stroke:var(--border);stroke-width:1.5;stroke-dasharray:6 5;}
  .ink{fill:var(--ink);}
  .muted{fill:var(--muted);}
  .faint{fill:var(--faint);}
  .brand{fill:var(--brand);}
  .arrow{stroke:var(--muted);stroke-width:2;fill:none;}
  .arrowhead{fill:var(--muted);}
  .loop{stroke:var(--brand);stroke-width:2;fill:none;}
  .loophead{fill:var(--brand);}
  .dimstroke{stroke:var(--dim);stroke-width:2;fill:none;}
</style>
<rect x="0" y="0" width="1000" height="600" class="bg"/><text x="60.0" y="54.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="24" class="ink" text-anchor="start" font-weight="800" letter-spacing="-0.3">The verify loop</text><text x="60.0" y="80.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" class="muted" text-anchor="start" font-weight="400">fuse_check answers with the compiler before the edit lands, so the agent repairs from real diagnostics without a build.</text><rect x="60.0" y="110.0" width="360.0" height="56.0" rx="12" class="box"/><text x="240.0" y="144.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16" class="ink" text-anchor="middle" font-weight="700">Agent proposes an edit</text><line x1="240.0" y1="166.0" x2="240.0" y2="189.0" class="arrow"/><polygon class="arrowhead" points="235.0,188.0 245.0,188.0 240.0,196.0"/><rect x="60.0" y="196.0" width="360.0" height="92.0" rx="12" class="box-fuse"/><text x="82.0" y="228.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="17" class="brand" text-anchor="start" font-weight="800">fuse_check</text><text x="82.0" y="252.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">typecheck the proposed edit before it lands;</text><text x="82.0" y="270.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">oracle grade: checked against the real compilation, no build.</text><rect x="590.0" y="200.0" width="350.0" height="84.0" rx="12" class="box"/><text x="612.0" y="232.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16" class="ink" text-anchor="start" font-weight="700">Agent applies the repair</text><text x="612.0" y="256.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">the repair packet names the fix</text><text x="612.0" y="273.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">(the member that exists, the type to use).</text><line x1="420.0" y1="224.0" x2="583.0" y2="224.0" class="loop"/><polygon class="loophead" points="582.0,219.0 582.0,229.0 590.0,224.0"/><text x="505.0" y="216.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="brand" text-anchor="middle" font-weight="600">diagnostics + repair packet</text><line x1="590.0" y1="260.0" x2="427.0" y2="260.0" class="loop"/><polygon class="loophead" points="428.0,255.0 428.0,265.0 420.0,260.0"/><text x="505.0" y="278.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="brand" text-anchor="middle" font-weight="600">apply, re-check</text><line x1="240.0" y1="288.0" x2="240.0" y2="323.0" class="arrow"/><polygon class="arrowhead" points="235.0,322.0 245.0,322.0 240.0,330.0"/><text x="254.0" y="313.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="faint" text-anchor="start" font-weight="400">clean</text><rect x="60.0" y="330.0" width="360.0" height="72.0" rx="12" class="box-fuse"/><text x="82.0" y="361.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="17" class="brand" text-anchor="start" font-weight="800">fuse_test</text><text x="82.0" y="385.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">run only the covering tests, not the whole suite.</text><line x1="240.0" y1="402.0" x2="240.0" y2="431.0" class="arrow"/><polygon class="arrowhead" points="235.0,430.0 245.0,430.0 240.0,438.0"/><text x="254.0" y="424.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="faint" text-anchor="start" font-weight="400">green</text><rect x="60.0" y="438.0" width="360.0" height="56.0" rx="12" class="box"/><text x="240.0" y="472.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16" class="ink" text-anchor="middle" font-weight="700">Done: the edit is verified</text><rect x="60.0" y="524.0" width="880.0" height="52.0" rx="12" class="box-dim"/><text x="80.0" y="546.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="faint" text-anchor="start" font-weight="700">The round-trip this replaces</text><text x="80.0" y="564.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="faint" text-anchor="start" font-weight="400">edit, dotnet build the solution, read the errors, edit again, dotnet test the whole suite; repeat until green.</text></svg>