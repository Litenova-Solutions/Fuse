<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
<style>
  :root, svg{
    --bg:#ffffff; --panel:#f7f8fb; --border:#e5e8ef; --ink:#171a21; --muted:#566072;
    --faint:#8a93a3; --brand:#6d4aff; --brand-soft:#efeaff; --brand-bd:#c9bcff;
    --dim:#c0c7d4; --dim-bg:#f1f3f7;
  }
  @media (prefers-color-scheme: dark){
    :root, svg{
      --bg:#0d1117; --panel:#161b22; --border:#30363d; --ink:#e6edf3; --muted:#9aa5b1;
      --faint:#7d8590; --brand:#a78bfa; --brand-soft:#211b34; --brand-bd:#5b4b8a;
      --dim:#484f58; --dim-bg:#161b22;
    }
  }
  svg.dark{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --ink:#e6edf3; --muted:#9aa5b1;
    --faint:#7d8590; --brand:#a78bfa; --brand-soft:#211b34; --brand-bd:#5b4b8a;
    --dim:#484f58; --dim-bg:#161b22;
  }
  .bg{fill:var(--bg);}
  .box{fill:var(--panel);stroke:var(--border);stroke-width:1.5;}
  .box-fuse{fill:var(--brand-soft);stroke:var(--brand-bd);stroke-width:1.5;}
  .box-dim{fill:var(--dim-bg);stroke:var(--border);stroke-width:1.5;stroke-dasharray:6 5;}
  .ink{fill:var(--ink);}
  .muted{fill:var(--muted);}
  .faint{fill:var(--faint);}
  .brand{fill:var(--brand);}
  .arrow{stroke:var(--muted);stroke-width:2;fill:none;}
  .arrowhead{fill:var(--muted);}
  .loop{stroke:var(--brand);stroke-width:2;fill:none;}
  .loophead{fill:var(--brand);}
  .dimstroke{stroke:var(--dim);stroke-width:2;fill:none;}
</style>
<rect x="0" y="0" width="1000" height="680" class="bg"/><text x="60.0" y="54.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="24" class="ink" text-anchor="start" font-weight="800" letter-spacing="-0.3">The verify loop</text><text x="60.0" y="80.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" class="muted" text-anchor="start" font-weight="400">Each answer names its verification grade. The fallback path may run a scoped project build.</text><rect x="60.0" y="110.0" width="360.0" height="56.0" rx="12" class="box"/><text x="240.0" y="144.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16" class="ink" text-anchor="middle" font-weight="700">Agent proposes an edit</text><line x1="240.0" y1="166.0" x2="240.0" y2="189.0" class="arrow"/><polygon class="arrowhead" points="235.0,188.0 245.0,188.0 240.0,196.0"/><rect x="60.0" y="196.0" width="360.0" height="78.0" rx="12" class="box-fuse"/><text x="82.0" y="228.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="17" class="brand" text-anchor="start" font-weight="800">fuse_check</text><text x="82.0" y="252.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">typecheck one proposed file before it lands</text><rect x="590.0" y="196.0" width="350.0" height="78.0" rx="12" class="box"/><text x="610.0" y="225.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="15" class="ink" text-anchor="start" font-weight="700">Repair packet, when supported</text><text x="610.0" y="250.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" text-anchor="start" font-weight="400">API-shape diagnostics may include an applicable fix.</text><line x1="420.0" y1="218.0" x2="583.0" y2="218.0" class="loop"/><polygon class="loophead" points="582.0,213.0 582.0,223.0 590.0,218.0"/><line x1="590.0" y1="258.0" x2="427.0" y2="258.0" class="loop"/><polygon class="loophead" points="428.0,253.0 428.0,263.0 420.0,258.0"/><text x="505.0" y="210.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" class="brand" text-anchor="middle" font-weight="400">diagnostic</text><text x="505.0" y="274.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" class="brand" text-anchor="middle" font-weight="400">apply and re-check</text><rect x="60.0" y="310.0" width="260.0" height="88.0" rx="12" class="box"/><text x="78.0" y="338.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" class="brand" text-anchor="start" font-weight="800">ORACLE</text><text x="78.0" y="362.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" text-anchor="start" font-weight="400">captured or resident compilation</text><text x="78.0" y="381.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="faint" text-anchor="start" font-weight="400">no build</text><rect x="370.0" y="310.0" width="260.0" height="88.0" rx="12" class="box"/><text x="388.0" y="338.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" class="brand" text-anchor="start" font-weight="800">SCOPED BUILD</text><text x="388.0" y="362.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" text-anchor="start" font-weight="400">owning project via dotnet build</text><text x="388.0" y="381.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="faint" text-anchor="start" font-weight="400">build-grade fallback</text><rect x="680.0" y="310.0" width="260.0" height="88.0" rx="12" class="box"/><text x="698.0" y="338.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" class="brand" text-anchor="start" font-weight="800">ABSTAIN</text><text x="698.0" y="362.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="muted" text-anchor="start" font-weight="400">compiler and toolchain unavailable</text><text x="698.0" y="381.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" class="faint" text-anchor="start" font-weight="400">no clean verdict</text><path d="M240 274 V290 H810" class="arrow"/><line x1="240.0" y1="290.0" x2="240.0" y2="303.0" class="arrow"/><polygon class="arrowhead" points="235.0,302.0 245.0,302.0 240.0,310.0"/><line x1="500.0" y1="290.0" x2="500.0" y2="303.0" class="arrow"/><polygon class="arrowhead" points="495.0,302.0 505.0,302.0 500.0,310.0"/><line x1="810.0" y1="290.0" x2="810.0" y2="303.0" class="arrow"/><polygon class="arrowhead" points="805.0,302.0 815.0,302.0 810.0,310.0"/><rect x="60.0" y="420.0" width="360.0" height="76.0" rx="12" class="box-fuse"/><text x="82.0" y="450.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="17" class="brand" text-anchor="start" font-weight="800">fuse_test</text><text x="82.0" y="474.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">select tests linked to the changed symbol</text><line x1="190.0" y1="398.0" x2="190.0" y2="413.0" class="arrow"/><polygon class="arrowhead" points="185.0,412.0 195.0,412.0 190.0,420.0"/><path d="M500 398 V408 H290 V413" class="arrow"/><polygon class="arrowhead" points="285,412 295,412 290,420"/><line x1="240.0" y1="496.0" x2="240.0" y2="523.0" class="arrow"/><polygon class="arrowhead" points="235.0,522.0 245.0,522.0 240.0,530.0"/><rect x="60.0" y="530.0" width="410.0" height="70.0" rx="12" class="box"/><text x="80.0" y="558.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" class="brand" text-anchor="start" font-weight="800">COVERAGE FOUND</text><text x="80.0" y="582.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">run the selected test types at build grade</text><rect x="530.0" y="530.0" width="410.0" height="70.0" rx="12" class="box"/><text x="550.0" y="558.0" font-family="ui-monospace,'Cascadia Code','SF Mono','JetBrains Mono',Consolas,monospace" font-size="12" class="brand" text-anchor="start" font-weight="800">NO COVERAGE EDGE</text><text x="550.0" y="582.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="muted" text-anchor="start" font-weight="400">selection-only; no whole-suite fallback</text><rect x="60.0" y="620.0" width="880.0" height="40.0" rx="12" class="box-dim"/><text x="80.0" y="645.0" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" class="faint" text-anchor="start" font-weight="400">Fuse adds graded checks and targeted selection; normal builds and broader test runs remain available.</text></svg>