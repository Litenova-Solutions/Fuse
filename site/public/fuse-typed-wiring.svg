or="start">MapGet(&quot;/health&quot;, ...)</text><line x1="310" y1="416" x2="541" y2="416" class="edge"/><polygon points="540,411 540,421 550,416" class="head"/><rect x="550" y="380" width="390" height="72" rx="12" class="panel"/><text x="570" y="409" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="14" class="ink" font-weight="700" text-anchor="start">/health  -&gt;  HealthEndpoints.Check</text><text x="570" y="434" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" class="muted" font-weight="400" text-anchor="start">route pattern -&gt; endpoint method</text><rect x="50" y="470" width="890" height="32" rx="12" class="panel"/><text x="495" y="491" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" class="muted" font-weight="600" text-anchor="middle">Each edge retains source-file and symbol provenance in the local index.</text></svg>