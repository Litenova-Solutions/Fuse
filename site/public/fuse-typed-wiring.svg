<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1000 520" role="img" aria-label="Concrete typed wiring from the OrderingApp fixture">
<style>
:root, svg{--bg:#fff;--panel:#f7f8fb;--border:#dfe3eb;--ink:#171a21;--muted:#566072;--brand:#6d4aff;--soft:#efeaff;--line:#8b79e8}
